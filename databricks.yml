# yaml-language-server: $schema=https://raw.githubusercontent.com/databricks/cli/main/schemas/bundle.schema.json
bundle:
  name: nyc_taxi_etl

variables:
  catalog_name:
    description: "Nombre del catálogo en Unity Catalog"
    default: "nyc_taxi_ivangalindo"

workspace:
  root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    nyc_taxi_pipeline:
      name: "[${bundle.target}] Pipeline Medallion NYC Taxi"
      
      
      job_clusters:
        - job_cluster_key: "etl_cluster"
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2" 
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            custom_tags:
              "ResourceClass": "SingleNode"
            data_security_mode: "SINGLE_USER"

      tasks:
        - task_key: "00_download_source_data"
          job_cluster_key: "etl_cluster"
          spark_python_task:
            python_file: "src/pipelines/00_download_data.py"

        - task_key: "01_raw_ingestion"
          depends_on:
            - task_key: "00_download_source_data" 
          job_cluster_key: "etl_cluster"
          spark_python_task:
            python_file: "src/pipelines/01_raw_ingestion.py"
            
        - task_key: "02_trusted_processing"
          depends_on:
            - task_key: "01_raw_ingestion"
          job_cluster_key: "etl_cluster"
          spark_python_task:
            python_file: "src/pipelines/02_trusted_processing.py"

        - task_key: "03_refined"
          depends_on:
            - task_key: "02_trusted_processing"
          job_cluster_key: "etl_cluster"
          spark_python_task:
            python_file: "src/pipelines/03_refined.py"

      # Permisos para que otros puedan ver
      permissions:
        - level: CAN_VIEW
          group_name: "users"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405609969491054.14.azuredatabricks.net

  prod:
    mode: production
    workspace:
      host: https://adb-7405609969491054.14.azuredatabricks.net
    variables:
      catalog_name: nyc_taxi_ivangalindo_prod
    