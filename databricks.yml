bundle:
  name: nyc_taxi_etl

variables:
  catalog_name:
    description: "Catálogo de Unity Catalog"
    default: "nyc_taxi_ivan"

workspace:
  root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    nyc_taxi_pipeline:
      name: "[${bundle.target}] Pipeline Medallion NYC Taxi"

      tasks:
        - task_key: "01_raw_ingestion"
          existing_cluster_id: "0501-153927-9n9fijz6"
          spark_python_task:
            python_file: "src/pipelines/01_raw_ingestion.py"
            parameters: ["--catalog", "${var.catalog_name}"]
          max_retries: 2 
          min_retry_interval_millis: 60000

        - task_key: "02_trusted_processing"
          depends_on:
            - task_key: "01_raw_ingestion"
          existing_cluster_id: "0501-153927-9n9fijz6"
          spark_python_task:
            python_file: "src/pipelines/02_trusted_processing.py"
            parameters: ["--catalog", "${var.catalog_name}"]

        - task_key: "03_refined"
          depends_on:
            - task_key: "02_trusted_processing"
          existing_cluster_id: "0501-153927-9n9fijz6"
          spark_python_task:
            python_file: "src/pipelines/03_refined.py"
            parameters: ["--catalog", "${var.catalog_name}"]

      permissions:
        - level: CAN_VIEW
          group_name: "users"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405607098835241.1.azuredatabricks.net

  prod:
    mode: production
    workspace:
      host: https://adb-7405607098835241.1.azuredatabricks.net
    variables:
      catalog_name: nyc_taxi_ivangalindo_prod